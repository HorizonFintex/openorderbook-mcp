name: Mirror to Public
on:
  push:
    branches: [ main ]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.MIRROR_APP_ID }}
          private-key: ${{ secrets.MIRROR_PRIVATE_KEY }}
          owner: your-public-org-name 

      - name: Push to Public
        run: |
          git remote add public https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/HorizonFintex/openorderbook-mcp.git
          git push public main --force
